services:
    postgres:
        image: postgres:18.4-alpine
        container_name: tasks_db_dev
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '${POSTGRES_PORT}:5432'
        networks:
            - tasks-network
        healthcheck:
            test:
              [
                  'CMD-SHELL',
                  "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'",
              ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    backend:
        image: amazoncorretto:25-alpine
        container_name: tasks_backend_dev
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
            SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
            SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - '8080:8080'
        volumes:
            - ../tasks-backend/target/tasks-backend-1.0.1.jar:/app/app.jar:ro
        working_dir: /app
        command: java -jar /app/app.jar
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/task-lists"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - tasks-network

networks:
    tasks-network:
        driver: bridge

volumes:
    tasks_frontend_node_modules: